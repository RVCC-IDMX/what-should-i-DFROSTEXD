<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>What Should I Play?</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="container">
      <header>
        <h1>What Should I Play?</h1>
        <p class="subtitle">Your personalized recommendation tool to find out what you want to play!</p>
      </header>

      <section class="preferences">
        <h2>Tell me your preferences</h2>

        <form id="preference-form">
          <div class="form-group">
            <label for="mood">What's your mood?</label>
            <select id="mood" name="mood">
              <option value="">Any mood</option>
              <option value="action oriented">Action Oriented</option>
              <option value="adventurous">Adventurous</option>
              <option value="challenging">Challenging</option>
              <option value="competitive">Competitive</option>
              <option value="energetic">Energetic</option>
              <option value="focused">Focused</option>
              <option value="intense">Intense</option>
              <option value="mindless grinding">Mindless Grinding</option>
              <option value="relaxed">Relaxed</option>
              <option value="strategic">Strategic</option>
            </select>
          </div>

          <div class="form-group">
            <label for="time">How much time do you have?</label>
            <select id="time" name="time">
              <option value="">Any amount</option>
              <option value="15">15 minutes or less</option>
              <option value="30">About 30 minutes</option>
              <option value="60">About an hour</option>
              <option value="120">A couple hours</option>
            </select>
          </div>

          <div class="form-group">
            <label for="category">Category preference?</label>
            <select id="category" name="category">
              <option value="">Any category</option>
              <option value="Action RPG">Action RPG</option>
              <option value="Action-Adventure">Action-Adventure</option>
              <option value="Battle Royale">Battle Royale</option>
              <option value="Extraction Shooter">Extraction Shooter</option>
              <option value="First-Person Arena Shooter">First-Person Arena Shooter</option>
              <option value="First-Person Sci-fi Shooter">First-Person Sci-fi Shooter</option>
              <option value="Open World Action-Adventure">Open World Action-Adventure</option>
              <option value="Open World RPG">Open World RPG</option>
              <option value="Sandbox">Sandbox</option>
              <option value="Space Simulation">Space Simulation</option>
              <option value="Strategy">Strategy</option>
              <option value="Tactical Shooter">Tactical Shooter</option>
              <option value="Team-Based Shooter">Team-Based Shooter</option>
            </select>
          </div>

          <button type="submit" class="btn-primary">Get Recommendations</button>
        </form>
      </section>

      <section class="results" id="results">
        <h2>Game recommendations</h2>
        <div id="recommendation-list" class="recommendation-list">
          <p class="placeholder">
            Fill out your preferences and click "Get Recommendations" to see
            results.
          </p>
        </div>
      </section>
    </main>

    <!-- Scripts loaded in order: data first, then matching functions, then app -->
    <script src="data.js"></script>
    <script src="matching.js"></script>
    <script src="app.js"></script>
  </body>
</html>
